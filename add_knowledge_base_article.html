<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Create Knowledge Base Article // Agent Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                colors: {
                    "error": "#ba1a1a", "error-container": "#ffdad6", "on-error-container": "#93000a",
                    "primary-container": "#2563eb", "background": "#f6faff", "on-background": "#141d23",
                    "on-primary": "#ffffff", "on-surface": "#141d23", "outline-variant": "#bcc9ce",
                    "secondary-container": "#dee0e4", "on-secondary-container": "#606366",
                    "primary": "#004ac6", "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#3d494d", "surface-container": "#e6eff8",
                    "surface-container-high": "#e0e9f2", "surface-container-low": "#ecf5fe",
                    "surface": "#f6faff", "inverse-surface": "#293138", "inverse-on-surface": "#e9f2fb",
                    dark: { bg: "#0b1216", surface: "#111a22", "surface-container": "#18242e",
                        "surface-container-high": "#1f2d3a", "surface-container-low": "#0d161d",
                        "on-surface": "#f0f4f8", "on-surface-variant": "#a0b2c1",
                        "outline-variant": "#344859" }
                },
                spacing: { "xl":"48px","sm":"16px","base":"4px","md":"24px","gutter":"24px","xs":"8px","container-max":"1440px","lg":"32px" },
                fontFamily: { "sans": ["Inter","sans-serif"], "headline": ["Inter","sans-serif"] }
            }}
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
        .custom-shadow { box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.03); }
    </style>
    <script src="supabase-helper.js?v=6"></script>
    <script src="shared.js?v=5"></script>
</head>
<body class="bg-[#F4F6F8] dark:bg-[#0b1216] text-on-surface dark:text-[#f0f4f8]">

    <div id="nav-container"></div>

    <div class="pt-[64px] overflow-y-auto h-screen">
        <main class="p-lg max-w-container-max mx-auto space-y-lg">
            <!-- Back Link -->
            <div>
                <a class="inline-flex items-center gap-1 text-primary dark:text-[#b4c5ff] hover:underline text-xs font-bold transition-all" href="knowledge_base_management.html">
                    <span class="material-symbols-outlined text-[16px]">chevron_left</span>
                    Back to Knowledge Base
                </a>
            </div>
            <!-- Page Header -->
            <header class="mb-lg border-b border-outline-variant dark:border-[#344859] pb-md">
                <h1 class="font-headline font-extrabold text-2xl text-on-surface dark:text-[#f0f4f8] uppercase tracking-tight">Create New Knowledge Base Article</h1>
                <p class="text-xs text-on-surface-variant dark:text-[#a0b2c1] mt-1">Draft a new technical guide for agents and players.</p>
            </header>
            <!-- Form card -->
            <div class="bg-white dark:bg-[#111a22] border border-outline-variant dark:border-[#344859] rounded-xl shadow-sm p-lg">
                <form class="space-y-md" id="addArticleForm" onsubmit="handleNewArticleSubmit(event)">
                    <div class="grid grid-cols-12 gap-md">
                        <div class="col-span-12 lg:col-span-8 space-y-md">
                            <div class="space-y-xs">
                                <label class="font-bold text-[10px] text-on-surface-variant dark:text-[#a0b2c1] block uppercase tracking-wider">ARTICLE TITLE</label>
                                <input id="new-article-title" class="w-full bg-white dark:bg-[#0d161d] border border-outline-variant dark:border-[#344859] rounded-lg px-sm py-2 text-xs focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface dark:text-[#f0f4f8] focus:outline-none" placeholder="e.g. Steam Wallet Syncing Errors & Purchases recovery..." required type="text">
                            </div>
                            <div class="space-y-xs">
                                <label class="font-bold text-[10px] text-on-surface-variant dark:text-[#a0b2c1] block uppercase tracking-wider">ARTICLE BODY CONTENT</label>
                                <div class="border border-outline-variant dark:border-[#344859] rounded-lg overflow-hidden bg-white dark:bg-[#0d161d] flex flex-col min-h-[300px]">
                                    <div class="flex items-center gap-1 p-2 bg-surface-container-low dark:bg-[#0d161d] border-b border-outline-variant dark:border-[#344859]">
                                        <button class="p-1 hover:bg-surface-container dark:hover:bg-[#18242e] rounded text-on-surface-variant dark:text-[#a0b2c1]" type="button" onclick="formatDoc('bold')"><span class="material-symbols-outlined text-[18px]">format_bold</span></button>
                                        <button class="p-1 hover:bg-surface-container dark:hover:bg-[#18242e] rounded text-on-surface-variant dark:text-[#a0b2c1]" type="button" onclick="formatDoc('italic')"><span class="material-symbols-outlined text-[18px]">format_italic</span></button>
                                        <button class="p-1 hover:bg-surface-container dark:hover:bg-[#18242e] rounded text-on-surface-variant dark:text-[#a0b2c1]" type="button" onclick="formatDoc('underline')"><span class="material-symbols-outlined text-[18px]">format_underlined</span></button>
                                        <div class="w-[1px] h-4 bg-outline-variant mx-1"></div>
                                        <button class="p-1 hover:bg-surface-container dark:hover:bg-[#18242e] rounded text-on-surface-variant dark:text-[#a0b2c1]" type="button" onclick="insertArticleHeader('H2')"><span class="text-xs font-bold font-sans">H2</span></button>
                                        <button class="p-1 hover:bg-surface-container dark:hover:bg-[#18242e] rounded text-on-surface-variant dark:text-[#a0b2c1]" type="button" onclick="insertArticleHeader('H3')"><span class="text-xs font-bold font-sans">H3</span></button>
                                    </div>
                                    <textarea id="new-article-content" class="w-full p-4 border-none outline-none focus:ring-0 text-xs text-on-surface dark:text-[#f0f4f8] bg-transparent flex-grow focus:outline-none" placeholder="Start writing troubleshooting steps here..." rows="12" required></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-span-12 lg:col-span-4 space-y-md">
                            <div class="space-y-xs">
                                <label class="font-bold text-[10px] text-on-surface-variant dark:text-[#a0b2c1] block uppercase tracking-wider font-bold">SELECT CATEGORY</label>
                                <select id="new-article-category" class="w-full bg-white dark:bg-[#0d161d] border border-outline-variant dark:border-[#344859] rounded-lg px-sm py-2.5 text-xs outline-none text-on-surface dark:text-[#f0f4f8] focus:outline-none" required>
                                    <option value="" disabled selected>Choose category...</option>
                                    <option value="Technical Issues">Technical Issues</option>
                                    <option value="Connection & Network">Connection & Network</option>
                                    <option value="Account & Security">Account & Security</option>
                                    <option value="Billing & Purchases">Billing & Purchases</option>
                                    <option value="Bug Report">Bug Report</option>
                                    <option value="Report a Player">Report a Player</option>
                                    <option value="In-Game Content">In-Game Content</option>
                                    <option value="Community Support">Community Support</option>
                                    <option value="Esports & Tournaments">Esports & Tournaments</option>
                                    <option value="Merchandise Support">Merchandise Support</option>
                                    <option value="Creator Partner Program">Creator Partner Program</option>
                                    <option value="Localization & Language">Localization & Language</option>
                                </select>
                            </div>
                            <div class="space-y-xs">
                                <label class="font-bold text-[10px] text-on-surface-variant dark:text-[#a0b2c1] block uppercase tracking-wider font-bold">KEYWORDS / TAGS</label>
                                <input id="new-article-tags" class="w-full bg-white dark:bg-[#0d161d] border border-outline-variant dark:border-[#344859] rounded-lg px-sm py-2 text-xs focus:ring-1 focus:ring-primary outline-none text-on-surface dark:text-[#f0f4f8] focus:outline-none" placeholder="e.g. steam, sync, wallet" type="text">
                                <p class="text-[10px] text-on-surface-variant dark:text-[#a0b2c1] italic">Separate tags with commas.</p>
                            </div>
                            <div class="space-y-xs">
                                <label class="font-bold text-[10px] text-on-surface-variant dark:text-[#a0b2c1] block uppercase tracking-wider font-bold">DRAG & DROP SCREENSHOT</label>
                                <div class="border-2 border-dashed border-outline-variant dark:border-[#344859] rounded-lg p-lg text-center cursor-pointer hover:bg-surface-container-low transition-colors" onclick="alert('Image upload simulated successfully!')">
                                    <span class="material-symbols-outlined text-outline dark:text-outline text-3xl mb-1">upload_file</span>
                                    <p class="text-[11px] text-on-surface-variant dark:text-[#a0b2c1]">Drag files or <span class="text-primary font-bold">browse</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-md border-t border-[#F4F6F8] dark:border-[#344859]">
                        <div class="flex items-center gap-2"></div>
                        <div class="flex gap-sm">
                            <a href="knowledge_base_management.html" class="px-md py-2 border border-outline dark:border-[#526c81] text-on-surface-variant dark:text-[#a0b2c1] rounded-lg text-xs font-bold hover:bg-surface-container transition-colors inline-block leading-tight flex items-center justify-center">Cancel</a>
                            <button class="px-md py-2 bg-surface-container-high dark:bg-[#1f2d3a] border border-outline-variant dark:border-[#344859] text-on-surface dark:text-[#f0f4f8] rounded-lg text-xs font-bold hover:bg-surface-container transition-colors shadow-sm" type="button" onclick="saveKbArticleAsDraft()">Save as Draft</button>
                            <button class="px-md py-2 bg-primary text-white rounded-lg text-xs font-bold hover:brightness-110 active:scale-95 transition-all shadow-sm" type="submit">Publish Article</button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toast-wrapper"></div>

    <script>
        const user = checkAuth();
        document.getElementById('nav-container').innerHTML = getNavHTML('knowledge-base');
        document.getElementById('toast-wrapper').innerHTML = getToastHTML();
        initUserUI();

        const DB = window.DB;
        
        DB_Helper.init().then(() => {
            return Promise.all([
                DB_Helper.syncTickets(DB),
                DB_Helper.syncArticles(DB)
            ]);
        }).then(() => {
            updateOpenBadge();
        }).catch(err => {
            console.error(err);
        });

        function updateOpenBadge() {
            const badge = document.getElementById('open-ticket-count-badge');
            const openCount = DB.tickets.filter(t => t.status === 'Open').length;
            if (badge) {
                badge.textContent = openCount;
                badge.classList.toggle('hidden', openCount === 0);
            }
        }

        function saveKbArticleAsDraft() {
            const title = document.getElementById('new-article-title').value.trim();
            const category = document.getElementById('new-article-category').value;
            const content = document.getElementById('new-article-content').value.trim();
            const tags = document.getElementById('new-article-tags').value.trim();
            
            if (!title) {
                showToast('Please enter an article title to save as draft.', 'error');
                return;
            }

            // Save to localStorage ONLY (do NOT call Supabase — DB DEFAULT sets is_published=true)
            DB_Helper.saveLocalDraftArticle(title, category || 'Technical Issues', content, tags);

            showToast('Bài viết đã được lưu nháp!');
            setTimeout(() => {
                window.location.href = 'knowledge_base_management.html';
            }, 800);
        }

        function handleNewArticleSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('new-article-title').value.trim();
            const category = document.getElementById('new-article-category').value;
            const content = document.getElementById('new-article-content').value.trim();
            const tags = document.getElementById('new-article-tags').value.trim();
            
            if (!title || !category || !content) return;
            
            DB_Helper.createArticle(title, category, content, tags, true)
                .then(() => {
                    showToast('Knowledge Base article published!');
                    setTimeout(() => {
                        window.location.href = 'knowledge_base_management.html';
                    }, 800);
                })
                .catch(err => {
                    console.error(err);
                    showToast('Lỗi lưu bài viết: ' + err.message, 'error');
                });
        }

        function formatDoc(cmd) {
            showToast(`Formatting: ${cmd} applied (simulated)`);
        }

        function insertArticleHeader(header) {
            const textarea = document.getElementById('new-article-content');
            const pos = textarea.selectionStart;
            const text = textarea.value;
            textarea.value = text.substring(0, pos) + `\n## ${header} Title\n` + text.substring(textarea.selectionEnd);
            textarea.focus();
        }
    </script>
</body>
</html>
